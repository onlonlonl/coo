<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Coo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#FDF5F6;color:#5A4548;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.messages{flex:1;overflow-y:auto;padding:16px 12px 8px;-webkit-overflow-scrolling:touch}
.msg-row{display:flex;margin-bottom:14px;align-items:flex-start;gap:8px}
.msg-row.iris{flex-direction:row-reverse}
.avatar{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1.5px solid #E8D4D6}
.bubble{max-width:68%;padding:10px 12px;font-size:14px;line-height:1.6;border-radius:14px}
.msg-row.iris .bubble{background:#F5E0E2;border:1px solid #E8CCCE;border-top-right-radius:4px}
.msg-row.lux .bubble{background:#FFFFFF;border:1px solid #E8E0E0;border-top-left-radius:4px}
.bubble-text{word-break:break-word}
.bubble-meta{font-size:10px;color:#C0A0A0;margin-top:4px;display:flex;align-items:center;gap:6px}
.waveform-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px;cursor:pointer}
.wave-play{width:20px;height:20px;border:none;background:none;color:#C08888;font-size:12px;padding:0;cursor:pointer}
.empty-state{text-align:center;padding:100px 20px;color:#D4B0B0;font-size:13px}
.bottom-bar{flex-shrink:0;padding:10px 16px 28px;background:#FDF5F6;border-top:1px solid #F0E0E2}
.rec-row{display:flex;align-items:center;gap:10px}
.rec-tab{flex:1;height:40px;border-radius:20px;border:1.5px solid #E0CCCE;background:#F8ECEE;color:#C08888;font-size:13px;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;transition:background 0.15s;font-family:inherit;position:relative;overflow:hidden}
.rec-tab.active{background:#E8C0C4}
.rec-timer{font-size:12px;color:#C08888;font-variant-numeric:tabular-nums;min-width:40px;text-align:center}
.toast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);background:rgba(180,120,120,0.9);color:#fff;padding:10px 22px;border-radius:18px;font-size:13px;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.messages::-webkit-scrollbar{width:2px}
.messages::-webkit-scrollbar-thumb{background:#E8D0D2;border-radius:2px}
#debug{position:fixed;top:4px;left:4px;font-size:9px;color:#ccc;z-index:999;pointer-events:none}
</style>
</head>
<body>
<div class="messages" id="messages"><div class="empty-state" id="emptyState">hold to speak</div></div>
<div class="toast" id="toast"></div>
<div class="bottom-bar"><div class="rec-row"><div class="rec-timer" id="recTimer"></div><div class="rec-tab" id="recTab">hold to speak</div><div class="rec-timer" id="recTimer2"></div></div></div>
<div id="debug"></div>
<script>
var SB='https://bqzuoqeaqqhylukicvqa.supabase.co';
var hs=location.hash.slice(1),P={};
hs.split('&').forEach(function(p){var kv=p.split('=');if(kv[0])P[kv[0]]=decodeURIComponent(kv[1]||'')});
var KEY=P.key||'',TOKEN=P.token||'';
var API='https://luxiris.duckdns.org/coo';
var IRIS_AV='https://bqzuoqeaqqhylukicvqa.supabase.co/storage/v1/object/public/rack-icons/bw-1783328096778.jpg';
var LUX_AV='https://bqzuoqeaqqhylukicvqa.supabase.co/storage/v1/object/public/images/IMG_9532.jpeg';

var msgEl=document.getElementById('messages');
var emptyEl=document.getElementById('emptyState');
var toastEl=document.getElementById('toast');
var recTab=document.getElementById('recTab');
var timerEl=document.getElementById('recTimer');
var dbg=document.getElementById('debug');
var msgs=[];

function log(s){dbg.textContent=s;console.log(s)}
function showToast(s){toastEl.textContent=s;toastEl.classList.add('show');setTimeout(function(){toastEl.classList.remove('show')},3000)}

function drawWave(cv,dur){
  var W=120,H=22;cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d'),s=(dur||1)*1000;
  ctx.fillStyle='#D4A8A8';
  for(var i=0;i<22;i++){
    var x=2+i*(W-4)/22,bw=(W-4)/22*0.55;
    var bh=3+Math.abs(Math.sin(s*0.013+i*0.7))*(H-6);
    ctx.beginPath();ctx.roundRect(x,(H-bh)/2,bw,bh,1.5);ctx.fill();
  }
}

function render(){
  var rows=document.querySelectorAll('.msg-row');
  for(var i=0;i<rows.length;i++)rows[i].remove();
  if(!msgs.length){emptyEl.style.display='';return}
  emptyEl.style.display='none';
  for(var j=0;j<msgs.length;j++){
    var m=msgs[j];
    msgEl.appendChild(mkMsg(m.text,m.duration_sec,m.created_at,true,m.audio_url));
    if(m.lux_reply)msgEl.appendChild(mkMsg(m.lux_reply,null,m.created_at,false,m.lux_audio_url));
  }
  msgEl.scrollTop=msgEl.scrollHeight;
}

function mkMsg(text,dur,time,isIris,audioUrl){
  var row=document.createElement('div');
  row.className='msg-row '+(isIris?'iris':'lux');
  var av=document.createElement('img');
  av.className='avatar';av.src=isIris?IRIS_AV:LUX_AV;av.alt='';
  row.appendChild(av);
  var bubble=document.createElement('div');
  bubble.className='bubble';
  if(isIris&&dur){
    var ww=document.createElement('div');ww.className='waveform-wrap';
    var pb=document.createElement('button');pb.className='wave-play';pb.textContent='\u25b6';
    var wc=document.createElement('canvas');drawWave(wc,dur);
    ww.appendChild(pb);ww.appendChild(wc);
    if(audioUrl)ww.onclick=function(){playAudio(audioUrl)};
    bubble.appendChild(ww);
  }
  var tx=document.createElement('div');tx.className='bubble-text';tx.textContent=text||'';
  bubble.appendChild(tx);
  var meta=document.createElement('div');meta.className='bubble-meta';
  if(dur){var ds=document.createElement('span');ds.textContent=dur.toFixed(1)+'s';meta.appendChild(ds)}
  var ts=document.createElement('span');var d=new Date(time);
  ts.textContent=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  meta.appendChild(ts);
  if(!isIris&&audioUrl){var pb2=document.createElement('button');pb2.className='wave-play';pb2.textContent='\u25b6';pb2.onclick=function(){playAudio(audioUrl)};meta.appendChild(pb2)}
  bubble.appendChild(meta);row.appendChild(bubble);
  return row;
}

var curAudio=null;
function playAudio(u){if(curAudio){curAudio.pause();curAudio=null}curAudio=new Audio(u);curAudio.play().catch(function(){})}

function load(){
  if(!KEY){log('no key');return}
  fetch(SB+'/rest/v1/coo_messages?order=created_at.asc&limit=50',{headers:{apikey:KEY,Authorization:'Bearer '+KEY}})
  .then(function(r){return r.json()})
  .then(function(data){msgs=data;render();log('loaded '+data.length)})
  .catch(function(e){log('load err: '+e.message)});
}

/* ── Recording ── */
var mediaRec=null,chunks=[],recStart=0,timerI=null;
var recording=false;

function startRec(){
  if(recording)return;
  log('requesting mic...');
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    log('mic ok, recording...');
    recording=true;
    var mt='';
    try{if(MediaRecorder.isTypeSupported('audio/webm'))mt='audio/webm'}catch(e){}
    mediaRec=new MediaRecorder(stream,mt?{mimeType:mt}:{});
    chunks=[];
    mediaRec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data)};
    mediaRec.onstop=function(){
      log('rec stopped, sending...');
      stream.getTracks().forEach(function(t){t.stop()});
      var blob=new Blob(chunks,{type:mediaRec.mimeType||'audio/mp4'});
      sendAudio(blob,mediaRec.mimeType||'audio/mp4');
      recording=false;mediaRec=null;
    };
    mediaRec.start();
    recStart=Date.now();
    recTab.classList.add('active');
    recTab.textContent='release to send';
    timerI=setInterval(function(){timerEl.textContent=((Date.now()-recStart)/1000).toFixed(1)+'s'},100);
  }).catch(function(e){
    log('mic err: '+e.message);
    recTab.textContent='microphone needed';
    setTimeout(function(){recTab.textContent='hold to speak'},2000);
  });
}

function stopRec(){
  log('stopRec called, recording='+recording);
  if(!recording)return;
  if(mediaRec&&mediaRec.state==='recording'){
    mediaRec.stop();
  }
  recTab.classList.remove('active');
  recTab.textContent='hold to speak';
  clearInterval(timerI);timerI=null;
  timerEl.textContent='';
}

function sendAudio(blob,mt){
  if(blob.size<500){log('too short');return}
  showToast('sending...');
  var ext=mt.indexOf('webm')>=0?'.webm':'.m4a';
  var form=new FormData();
  form.append('file',blob,'voice'+ext);
  fetch(API,{method:'POST',headers:{'X-Coo-Token':TOKEN},body:form})
  .then(function(r){
    log('response: '+r.status);
    if(r.ok){showToast('sent');load()}
    else{r.text().then(function(t){log('err: '+t);showToast('error: '+r.status)})}
  }).catch(function(e){log('send err: '+e.message);showToast('network error')});
}

/* ── Touch/mouse events on window level ── */
var pressing=false;

recTab.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(!pressing){pressing=true;startRec()}
},{passive:false});

window.addEventListener('touchend',function(e){
  if(pressing){pressing=false;stopRec()}
},{passive:false});

window.addEventListener('touchcancel',function(){
  if(pressing){pressing=false;stopRec()}
});

recTab.addEventListener('mousedown',function(e){
  e.preventDefault();
  if(!pressing){pressing=true;startRec()}
});

window.addEventListener('mouseup',function(){
  if(pressing){pressing=false;stopRec()}
});

/* Prevent context menu on long press */
recTab.addEventListener('contextmenu',function(e){e.preventDefault()});

load();
setInterval(load,15000);
</script>
</body>
</html>
