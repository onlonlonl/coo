<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: #FDF5F6;
    color: #5A4548;
    -webkit-tap-highlight-color: transparent;
    display: flex; flex-direction: column;
  }
  .header {
    text-align: center; padding: 16px 0 10px; flex-shrink: 0;
    position: relative;
  }
  .header h1 {
    font-size: 18px; font-weight: 600; letter-spacing: 3px;
    color: #C08888;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 12px 16px 8px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-row {
    display: flex; margin-bottom: 16px; align-items: flex-end; gap: 8px;
  }
  .msg-row.iris { flex-direction: row-reverse; }
  .msg-row.lux { flex-direction: row; }
  .bubble-wrap { max-width: 72%; position: relative; }
  .bubble-canvas {
    position: absolute; top: -4px; left: -4px;
    pointer-events: none;
  }
  .bubble-inner {
    position: relative; z-index: 1;
    padding: 12px 14px; font-size: 14px; line-height: 1.6;
    min-width: 60px;
  }
  .msg-row.iris .bubble-inner { background: rgba(255,245,246,0.6); }
  .msg-row.lux .bubble-inner { background: rgba(255,250,250,0.6); }
  .bubble-text { word-break: break-word; }
  .bubble-meta {
    font-size: 10px; color: #C0A0A0; margin-top: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .play-btn {
    width: 24px; height: 24px; border: none; background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #C08888; font-size: 14px;
  }
  .waveform-canvas { display: block; margin-top: 6px; }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: #D4B0B0; font-size: 13px; line-height: 2;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .bottom-bar {
    flex-shrink: 0; padding: 12px 20px 28px; text-align: center;
    position: relative;
  }
  .rec-area { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .rec-hint {
    font-size: 11px; color: #D4B0B0; margin-bottom: 8px;
    transition: all 0.3s;
  }
  .rec-hint.recording { color: #C08888; }
  .rec-btn-wrap { position: relative; width: 64px; height: 64px; }
  .rec-canvas { position: absolute; top: -4px; left: -4px; pointer-events: none; }
  .rec-btn {
    width: 64px; height: 64px; border: none; border-radius: 50%;
    background: #F5E0E2; cursor: pointer; position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #C08888;
    transition: transform 0.15s, background 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .rec-btn:active, .rec-btn.active {
    transform: scale(1.1); background: #E8C0C4;
  }
  .rec-timer {
    font-size: 12px; color: #C08888; font-variant-numeric: tabular-nums;
    min-width: 36px;
  }
  .sending-indicator {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(192,136,136,0.9); color: #fff; padding: 12px 24px;
    border-radius: 20px; font-size: 13px; z-index: 100;
    display: none;
  }
  .sending-indicator.show { display: block; }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: #E8D0D2; border-radius: 3px; }
</style>
</head>
<body>
<div class="header"><h1>Coo</h1></div>
<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🕊️</div>
    按住说话<br>声音会留在这里
  </div>
</div>
<div class="sending-indicator" id="sendingIndicator">sending...</div>
<div class="bottom-bar">
  <div class="rec-hint" id="recHint">按住说话</div>
  <div class="rec-area">
    <div class="rec-timer" id="recTimer"></div>
    <div class="rec-btn-wrap">
      <canvas class="rec-canvas" id="recCanvas" width="72" height="72"></canvas>
      <button class="rec-btn" id="recBtn">🕊️</button>
    </div>
    <div class="rec-timer"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/rough.js/4.6.6/rough.umd.min.js"></script>
<script>
const SUPABASE_URL='https://bqzuoqeaqqhylukicvqa.supabase.co';
const hash=window.location.hash.slice(1);const params={};
hash.split('&').forEach(p=>{const[k,v]=p.split('=');if(k)params[k]=decodeURIComponent(v||'')});
const SUPABASE_KEY=params.key||'';const COO_TOKEN=params.token||'';
const COO_API='https://luxiris.duckdns.org/coo';
const ROUGH_OPTS={roughness:0.6,bowing:0.8,disableMultiStroke:true,seed:42};
function drawRoughBubble(canvas,w,h,isIris){canvas.width=w+8;canvas.height=h+8;const rc=rough.canvas(canvas);const fill=isIris?'#F5E0E2':'#F0E8E8';const stroke=isIris?'#D4A8A8':'#C8B8B8';rc.rectangle(4,4,w,h,{...ROUGH_OPTS,fill,fillStyle:'solid',fillWeight:0.5,stroke,strokeWidth:1.2})}
function drawRecButton(){const c=document.getElementById('recCanvas');c.width=72;c.height=72;const rc=rough.canvas(c);rc.circle(36,36,64,{...ROUGH_OPTS,stroke:'#D4A8A8',strokeWidth:1.5,fill:'none'})}
function drawWaveform(canvas,features,duration,isIris){const W=160,H=28;canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');const color=isIris?'#D4A8A8':'#C0B0B0';const bars=30;const seed=(duration||1)*1000;for(let i=0;i<bars;i++){const x=4+i*(W-8)/bars;const bw=(W-8)/bars*0.6;const h=4+Math.abs(Math.sin(seed*0.01+i*0.7))*(H-8);const y=(H-h)/2;ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,y,bw,h,1.5);ctx.fill()}}
const messagesEl=document.getElementById('messages');const emptyState=document.getElementById('emptyState');let allMessages=[];
function renderMessages(){document.querySelectorAll('.msg-row').forEach(el=>el.remove());if(allMessages.length===0){emptyState.style.display='';return}emptyState.style.display='none';allMessages.forEach(msg=>{const irisRow=createBubble(msg.text,msg.duration_sec,msg.created_at,true,msg.audio_url);messagesEl.appendChild(irisRow);if(msg.lux_reply){const luxRow=createBubble(msg.lux_reply,null,msg.created_at,false,msg.lux_audio_url);messagesEl.appendChild(luxRow)}});requestAnimationFrame(()=>{document.querySelectorAll('.bubble-wrap').forEach(wrap=>{const inner=wrap.querySelector('.bubble-inner');const canvas=wrap.querySelector('.bubble-canvas');const isIris=wrap.closest('.msg-row').classList.contains('iris');drawRoughBubble(canvas,inner.offsetWidth,inner.offsetHeight,isIris)});messagesEl.scrollTop=messagesEl.scrollHeight})}
function createBubble(text,duration,time,isIris,audioUrl){const row=document.createElement('div');row.className='msg-row '+(isIris?'iris':'lux');const wrap=document.createElement('div');wrap.className='bubble-wrap';const canvas=document.createElement('canvas');canvas.className='bubble-canvas';wrap.appendChild(canvas);const inner=document.createElement('div');inner.className='bubble-inner';if(isIris&&duration){const waveCanvas=document.createElement('canvas');waveCanvas.className='waveform-canvas';drawWaveform(waveCanvas,null,duration,true);if(audioUrl){waveCanvas.style.cursor='pointer';waveCanvas.addEventListener('click',()=>playAudio(audioUrl))}inner.appendChild(waveCanvas)}const textEl=document.createElement('div');textEl.className='bubble-text';textEl.textContent=text||'';inner.appendChild(textEl);const meta=document.createElement('div');meta.className='bubble-meta';if(duration){const dur=document.createElement('span');dur.textContent=duration.toFixed(1)+'s';meta.appendChild(dur)}const timeEl=document.createElement('span');const d=new Date(time);timeEl.textContent=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');meta.appendChild(timeEl);if(!isIris&&audioUrl){const playBtn=document.createElement('button');playBtn.className='play-btn';playBtn.textContent='▶';playBtn.addEventListener('click',()=>playAudio(audioUrl));meta.appendChild(playBtn)}inner.appendChild(meta);wrap.appendChild(inner);row.appendChild(wrap);return row}
let currentAudio=null;function playAudio(url){if(currentAudio){currentAudio.pause();currentAudio=null}currentAudio=new Audio(url);currentAudio.play().catch(()=>{})}
async function loadMessages(){if(!SUPABASE_KEY)return;try{const r=await fetch(SUPABASE_URL+'/rest/v1/coo_messages?order=created_at.asc&limit=50',{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});if(r.ok){allMessages=await r.json();renderMessages()}}catch(e){console.error('load error',e)}}
const recBtn=document.getElementById('recBtn');const recHint=document.getElementById('recHint');const recTimer=document.getElementById('recTimer');const sendingEl=document.getElementById('sendingIndicator');let mediaRec=null,audioChunks=[],recStart=0,timerInterval=null;
function startRecording(){navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{const mimeType=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'';mediaRec=new MediaRecorder(stream,mimeType?{mimeType}:{});audioChunks=[];mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};mediaRec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(audioChunks,{type:mediaRec.mimeType||'audio/mp4'});sendAudio(blob,mediaRec.mimeType||'audio/mp4')};mediaRec.start();recStart=Date.now();recBtn.classList.add('active');recHint.textContent='松手发送';recHint.classList.add('recording');timerInterval=setInterval(()=>{const s=((Date.now()-recStart)/1000).toFixed(1);recTimer.textContent=s+'s'},100)}).catch(e=>{recHint.textContent='需要麦克风权限';setTimeout(()=>{recHint.textContent='按住说话'},2000)})}
function stopRecording(){if(mediaRec&&mediaRec.state==='recording'){mediaRec.stop()}recBtn.classList.remove('active');recHint.textContent='按住说话';recHint.classList.remove('recording');clearInterval(timerInterval);recTimer.textContent=''}
async function sendAudio(blob,mimeType){if(blob.size<1000)return;sendingEl.classList.add('show');try{const ext=mimeType.includes('webm')?'.webm':'.m4a';const form=new FormData();form.append('file',blob,'voice'+ext);const r=await fetch(COO_API,{method:'POST',headers:{'X-Coo-Token':COO_TOKEN},body:form});if(r.ok){await loadMessages()}else{console.error('send error',r.status)}}catch(e){console.error('send error',e)}sendingEl.classList.remove('show')}
let pressing=false;
recBtn.addEventListener('touchstart',e=>{e.preventDefault();pressing=true;startRecording()},{passive:false});
recBtn.addEventListener('touchend',e=>{e.preventDefault();if(pressing){pressing=false;stopRecording()}},{passive:false});
recBtn.addEventListener('touchcancel',e=>{if(pressing){pressing=false;stopRecording()}});
recBtn.addEventListener('mousedown',e=>{pressing=true;startRecording()});
window.addEventListener('mouseup',e=>{if(pressing){pressing=false;stopRecording()}});
drawRecButton();loadMessages();setInterval(loadMessages,15000);
</script>
</body>
</html>
